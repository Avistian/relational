name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p public/labs
          cp index.html notebooks.html .nojekyll public/
          cp -r assets lessons reference public/
          # Notebooks for the web: rendered HTML (view) + sources (download/Colab/Binder) + README
          cp -r labs/html public/labs/
          cp labs/*.ipynb public/labs/ 2>/dev/null || true
          cp labs/README.md public/labs/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
